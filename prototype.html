<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prototype — Design Core</title>
  <link rel="stylesheet" href="styles/shared.css">
  <link rel="stylesheet" href="styles/app.css">
  <style>
    .proto-label {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
    }
    .phone-frame--desktop {
      width: 1024px;
      height: 768px;
      border-radius: 12px;
    }
    .phone-frame--desktop .phone-iframe {
      width: 1024px;
      height: 768px;
    }
    .phone-frame--online {
      width: 1280px;
      height: 800px;
      border-radius: 12px;
    }
    .phone-frame--online .phone-iframe {
      width: 1280px;
      height: 800px;
    }
    .phone-frame--responsive {
      width: 90vw;
      max-width: 1200px;
      height: 80vh;
      border-radius: 12px;
    }
    .phone-frame--responsive .phone-iframe {
      width: 100%;
      height: 100%;
    }
    body.is-embed .site-nav,
    body.is-embed .proto-label { display: none !important; }
    body.is-embed .preview-page {
      padding: 0;
      display: flex;
      align-items: stretch;
    }
    body.is-embed .phone-frame-wrap {
      display: flex;
      flex: 1;
      align-items: stretch;
    }
    body.is-embed .phone-frame,
    body.is-embed .phone-frame--desktop,
    body.is-embed .phone-frame--online,
    body.is-embed .phone-frame--responsive {
      width: 100% !important;
      height: 100vh !important;
      max-width: none;
      border-radius: 0;
      border: none;
      box-shadow: none;
    }
    body.is-embed .phone-iframe {
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>
  <div class="preview-page">
    <div class="phone-frame-wrap">
      <div id="proto-container" class="phone-frame">
        <iframe id="proto-frame" class="phone-iframe" sandbox="allow-scripts allow-same-origin"></iframe>
      </div>
    </div>
    <div id="proto-name" class="proto-label"></div>
  </div>

  <script src="scripts/shared.js"></script>
  <script src="scripts/nav.js"></script>
  <script>
    const projectId = getParam("project");
    const protoId = getParam("proto");
    const isEmbed = getParam("view") === "embed";

    if (!projectId || !protoId) window.location.href = "index.html";

    if (isEmbed) document.body.classList.add("is-embed");

    const basePath = "data/projects/" + projectId + "/prototypes/" + protoId + "/";

    if (!isEmbed) {
      loadSiteConfig().then(() => {
        renderNav({
          breadcrumbs: [
            { label: projectId, href: "project.html?id=" + projectId, id: "nav-project" },
            { label: protoId, id: "nav-proto" },
          ],
          actions: [{ label: "Copy link", id: "copy-btn", href: "#" }],
        });
        const copyBtn = document.getElementById("copy-btn");
        if (copyBtn) {
          copyBtn.addEventListener("click", (e) => {
            e.preventDefault();
            copyLink(prototypeUrl(projectId, protoId), copyBtn);
          });
        }
      });
    }

    if (!isEmbed) {
      fetchJSON("data/projects/" + projectId + "/project.json")
        .then(data => {
          var el = document.getElementById("nav-project");
          if (el) el.textContent = data.name;
        })
        .catch(() => {});
    }

    fetchJSON(basePath + "meta.json")
      .then(data => {
        document.getElementById("proto-name").textContent = data.name + " — " + data.description;
        document.title = data.name + " — Design Core";
        var el = document.getElementById("nav-proto");
        if (el) el.textContent = data.name;
        var bust =
          data.updatedAt != null && String(data.updatedAt).trim() !== ""
            ? String(data.updatedAt).trim()
            : data.cacheKey != null && String(data.cacheKey).trim() !== ""
              ? String(data.cacheKey).trim()
              : "";
        document.getElementById("proto-frame").src =
          basePath + "index.html" + (bust !== "" ? "?v=" + encodeURIComponent(bust) : "");
      })
      .catch(() => {
        document.getElementById("proto-name").textContent = protoId;
        document.getElementById("proto-frame").src = basePath + "index.html";
      });

    if (!isEmbed) {
      fetchJSON("data/projects/" + projectId + "/prototypes/index.json")
        .then(data => {
          var proto = data.prototypes.find(p => p.id === protoId);
          if (proto && proto.device) {
            var device = proto.device.toLowerCase();
            var container = document.getElementById("proto-container");
            if (device === "desktop") {
              container.classList.add("phone-frame--desktop");
            } else if (device === "online") {
              container.classList.add("phone-frame--online");
            } else if (device === "responsive") {
              container.classList.add("phone-frame--responsive");
            }
          }
        })
        .catch(() => {});
    }
  </script>
</body>
</html>
