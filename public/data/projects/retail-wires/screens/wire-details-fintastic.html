<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap">
<style>
  html, body { margin: 0; padding: 0; }
  .fintastic { font-family: 'DM Sans', sans-serif; }
</style>
<div class="fintastic" style="background:#0f0f12; color:#e4e4e7; min-height:100%; display:flex; flex-direction:column;">
  <div style="padding:48px 20px 20px; display:flex; align-items:center; justify-content:space-between;">
    <span style="font-size:0.75rem; font-weight:600; letter-spacing:0.1em; color:#71717a;">← Back</span>
    <span style="font-size:0.7rem; font-weight:600; color:#71717a;">9:41</span>
  </div>

  <main style="flex:1; padding:0 20px;">
    <!-- Amount - neon accent -->
    <div style="margin-bottom:40px;">
      <p style="font-size:0.65rem; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#71717a; margin:0 0 8px 0;">Outgoing wire</p>
      <p style="font-size:3rem; font-weight:800; letter-spacing:-0.04em; color:#22d3ee; margin:0 0 4px 0; text-shadow:0 0 40px rgba(34,211,238,0.3);">$250.00</p>
      <p style="font-size:0.9rem; color:#a1a1aa; margin:0 0 16px 0;">Materials payment</p>
      <span style="display:inline-block; padding:6px 14px; font-size:0.7rem; font-weight:700; letter-spacing:0.05em; background:#22d3ee; color:#0f0f12; border-radius:4px;">READY</span>
    </div>

    <!-- Info blocks - sharp corners, thin borders -->
    <div style="border:1px solid #27272a; border-radius:2px; margin-bottom:12px; overflow:hidden;">
      <div style="display:flex; justify-content:space-between; align-items:center; padding:18px 20px; border-bottom:1px solid #27272a;">
        <span style="font-size:0.7rem; color:#71717a;">From</span>
        <span style="font-size:0.9rem; font-weight:600;">Business Checking (x1234)</span>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center; padding:18px 20px; border-bottom:1px solid #27272a;">
        <span style="font-size:0.7rem; color:#71717a;">To</span>
        <span style="font-size:0.9rem; font-weight:600;">Emma Reed</span>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:16px; padding:18px 20px;">
        <span style="font-size:0.7rem; color:#71717a; flex-shrink:0;">Address</span>
        <span style="font-size:0.85rem; font-weight:500; text-align:right; line-height:1.5; color:#d4d4d8;">500 W. 33rd St, 62nd Floor<br>30 Hudson Yards<br>10001 New York, NY, US</span>
      </div>
    </div>

    <div style="border:1px solid #27272a; border-radius:2px; margin-bottom:24px; overflow:hidden;">
      <div style="display:flex; justify-content:space-between; align-items:center; padding:18px 20px; border-bottom:1px solid #27272a;">
        <span style="font-size:0.7rem; color:#71717a;">Reference</span>
        <span style="font-size:0.8rem; font-weight:500; font-variant-numeric:tabular-nums;">WIR-2024-089234</span>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center; padding:18px 20px; border-bottom:1px solid #27272a;">
        <span style="font-size:0.7rem; color:#71717a;">Fee</span>
        <span style="font-size:0.9rem; font-weight:600; color:#a1a1aa;">$25.00</span>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center; padding:18px 20px;">
        <span style="font-size:0.7rem; color:#71717a;">Notes</span>
        <span style="font-size:0.85rem; font-weight:500; color:#d4d4d8;">This is a note</span>
      </div>
    </div>
  </main>

  <div style="padding:20px 20px 36px;">
    <button style="width:100%; padding:18px; font-size:0.95rem; font-weight:700; letter-spacing:0.05em; background:#22d3ee; color:#0f0f12; border:none; border-radius:4px; cursor:pointer; font-family:inherit;">SEND WIRE</button>
  </div>
</div>
