<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@400;500;600&display=swap">
<style>
  html, body { margin: 0; padding: 0; }
  .editorial { font-family: 'Source Sans 3', sans-serif; }
  .editorial .serif { font-family: 'Cormorant Garamond', serif; }
</style>
<div class="editorial" style="background:#faf9f6; color:#1a1a1a; min-height:100%; display:flex; flex-direction:column;">
  <div style="padding:52px 28px 32px;">
    <span style="font-size:0.8rem; font-weight:500; color:#6b6b6b;">← Wire details</span>
  </div>

  <main style="flex:1; padding:0 28px 40px;">
    <!-- Hero amount - serif, warm -->
    <div style="margin-bottom:48px; padding-bottom:32px; border-bottom:1px solid #e8e6e1;">
      <p class="serif" style="font-size:3.2rem; font-weight:700; color:#2d2d2d; margin:0 0 8px 0; letter-spacing:-0.02em; line-height:1.1;">$250.00</p>
      <p style="font-size:0.85rem; color:#6b6b6b; margin:0 0 16px 0;">Materials payment</p>
      <span style="font-size:0.7rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:#4a7c59;">Ready to send</span>
    </div>

    <!-- Elegant rows - lots of breathing room -->
    <div style="margin-bottom:40px;">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:24px; padding:20px 0; border-bottom:1px solid #e8e6e1;">
        <span style="font-size:0.75rem; font-weight:500; color:#8a8a8a; flex-shrink:0;">From account</span>
        <span style="font-size:0.95rem; font-weight:500; text-align:right;">Business Checking (x1234)</span>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:24px; padding:20px 0; border-bottom:1px solid #e8e6e1;">
        <span style="font-size:0.75rem; font-weight:500; color:#8a8a8a; flex-shrink:0;">Recipient</span>
        <span style="font-size:0.95rem; font-weight:500; text-align:right;">Emma Reed</span>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:24px; padding:20px 0; border-bottom:1px solid #e8e6e1;">
        <span style="font-size:0.75rem; font-weight:500; color:#8a8a8a; flex-shrink:0;">Account number</span>
        <span style="font-size:0.95rem; font-weight:500; text-align:right;">123456789</span>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:24px; padding:20px 0; border-bottom:1px solid #e8e6e1;">
        <span style="font-size:0.75rem; font-weight:500; color:#8a8a8a; flex-shrink:0;">Address</span>
        <span style="font-size:0.9rem; font-weight:500; text-align:right; line-height:1.6; color:#3d3d3d;">500 W. 33rd St, 62nd Floor<br>30 Hudson Yards<br>10001 New York, NY, US</span>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:24px; padding:20px 0;">
        <span style="font-size:0.75rem; font-weight:500; color:#8a8a8a; flex-shrink:0;">Wire fee</span>
        <span style="font-size:0.95rem; font-weight:500; text-align:right;">$25.00</span>
      </div>
    </div>

    <p style="font-size:0.8rem; color:#8a8a8a; line-height:1.6; margin:0;">This is a note</p>
  </main>

  <div style="padding:24px 28px 40px;">
    <button style="width:100%; padding:18px; font-size:0.9rem; font-weight:600; background:#2d2d2d; color:#faf9f6; border:none; border-radius:2px; cursor:pointer; font-family:inherit; letter-spacing:0.03em;">Review and initiate</button>
  </div>
</div>
