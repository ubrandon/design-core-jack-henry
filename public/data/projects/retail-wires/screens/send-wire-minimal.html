<link rel="stylesheet" href="../../../../styles/shared.css">
<link rel="stylesheet" href="../../../../styles/ds.css">
<link rel="stylesheet" href="../../../../data/design-system/company.css">
<style>
  html, body { margin: 0; padding: 0; }
  .minimal-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid rgba(0,0,0,0.06); }
  .minimal-row:last-child { border-bottom: none; }
</style>
<div style="background:var(--bg-0); display:flex; flex-direction:column;">
  <div style="padding:16px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid rgba(0,0,0,0.06);">
    <span style="font-size:0.85rem; font-weight:600; color:var(--jh-blue);">‹ Back</span>
    <span style="font-size:1rem; font-weight:700; color:rgba(0,0,0,0.9);">Send wire</span>
    <span style="font-size:0.85rem; font-weight:600; color:var(--jh-blue);">Cancel</span>
  </div>

  <main style="flex:1; padding:0 20px;">
    <div style="padding:24px 0; border-bottom:1px solid rgba(0,0,0,0.06);">
      <div class="minimal-row">
        <span style="font-size:0.9rem; color:var(--muted);">Wire name</span>
        <span style="font-size:0.9rem; color:rgba(0,0,0,0.4);">Add name</span>
      </div>
      <div class="minimal-row">
        <span style="font-size:0.9rem; color:var(--muted);">From account</span>
        <span style="font-size:0.9rem; color:rgba(0,0,0,0.4);">Select</span>
      </div>
      <div class="minimal-row">
        <span style="font-size:0.9rem; color:var(--muted);">Amount</span>
        <span style="font-size:1rem; font-weight:700; color:var(--jh-blue);">$0.00</span>
      </div>
    </div>

    <div style="padding:20px 0; border-bottom:1px solid rgba(0,0,0,0.06);">
      <div class="minimal-row">
        <div style="display:flex; align-items:center; gap:12px;">
          <div style="width:36px; height:36px; border-radius:50%; background:rgba(var(--jh-blue-rgb),0.1); display:grid; place-items:center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--jh-blue)" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div>
            <p style="font-size:0.9rem; font-weight:600; color:rgba(0,0,0,0.9); margin:0;">Creditor</p>
            <p style="font-size:0.8rem; color:var(--muted); margin:0;">Add recipient</p>
          </div>
        </div>
        <span style="font-size:0.9rem; font-weight:600; color:var(--jh-blue);">+ Add</span>
      </div>
      <div class="minimal-row">
        <div style="display:flex; align-items:center; gap:12px;">
          <div style="width:36px; height:36px; border-radius:50%; background:rgba(var(--jh-blue-rgb),0.1); display:grid; place-items:center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--jh-blue)" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          </div>
          <div>
            <p style="font-size:0.9rem; font-weight:600; color:rgba(0,0,0,0.9); margin:0;">Creditor agent</p>
            <p style="font-size:0.8rem; color:var(--muted); margin:0;">Add bank</p>
          </div>
        </div>
        <span style="font-size:0.9rem; font-weight:600; color:var(--jh-blue);">+ Add</span>
      </div>
    </div>

    <p style="font-size:0.8rem; color:var(--muted); padding:16px 0; margin:0;">Optional: <span style="color:var(--jh-blue); font-weight:600;">Add remittance info</span></p>
  </main>

  <div style="padding:20px; border-top:1px solid rgba(0,0,0,0.06);">
    <button class="jh-btn-primary" style="width:100%; padding:14px; font-size:0.95rem; opacity:0.5;">Review & send</button>
  </div>
</div>
