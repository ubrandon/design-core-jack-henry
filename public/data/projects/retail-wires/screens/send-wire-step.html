<link rel="stylesheet" href="../../../../styles/shared.css">
<link rel="stylesheet" href="../../../../styles/ds.css">
<link rel="stylesheet" href="../../../../data/design-system/company.css">
<style>
  html, body { margin: 0; padding: 0; }
  .jh-row { align-items: flex-start; }
  .step-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(0,0,0,0.15); }
  .step-dot.active { background: var(--jh-blue); width: 24px; border-radius: 4px; }
</style>
<div style="background:var(--bg-1); display:flex; flex-direction:column;">
  <div class="jh-header-bar" style="border-radius:0; padding:12px 16px 14px;">
    <button style="background:none; border:none; color:#fff; padding:4px 0; font-size:0.95rem; font-weight:600; font-family:inherit;">Back</button>
    <span class="jh-header-bar-title">Send wire</span>
    <button style="background:none; border:none; color:rgba(255,255,255,0.95); padding:4px 0; font-size:0.85rem; font-weight:700; font-family:inherit;">Cancel</button>
  </div>

  <div style="padding:12px 20px; display:flex; align-items:center; gap:8px;">
    <span style="font-size:0.75rem; font-weight:600; color:var(--muted);">Step 1 of 3</span>
    <div style="flex:1; display:flex; gap:6px; align-items:center;">
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
    </div>
  </div>

  <main style="flex:1; padding:20px 16px;">
    <p style="font-size:1.1rem; font-weight:700; color:rgba(0,0,0,0.9); margin:0 0 8px 0;">Wire details</p>
    <p style="font-size:0.85rem; color:var(--muted); margin:0 0 20px 0;">Enter the amount and source account.</p>

    <div style="background:var(--bg-0); border-radius:var(--radius-lg); padding:20px; margin-bottom:16px;">
      <div style="margin-bottom:16px;">
        <label style="display:block; font-size:0.75rem; font-weight:600; color:rgba(0,0,0,0.6); margin-bottom:6px;">Wire name</label>
        <div style="padding:12px 16px; border-radius:var(--radius-md); background:var(--bg-1); border:1px solid rgba(0,0,0,0.08);">e.g. Payment for materials</div>
      </div>
      <div style="margin-bottom:16px;">
        <label style="display:block; font-size:0.75rem; font-weight:600; color:rgba(0,0,0,0.6); margin-bottom:6px;">From account</label>
        <div style="padding:12px 16px; border-radius:var(--radius-md); background:var(--bg-1); border:1px solid rgba(0,0,0,0.08); display:flex; justify-content:space-between;">Select account <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(0,0,0,0.4)" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></div>
      </div>
      <div>
        <label style="display:block; font-size:0.75rem; font-weight:600; color:rgba(0,0,0,0.6); margin-bottom:6px;">Amount</label>
        <div style="padding:14px 16px; border-radius:var(--radius-md); background:var(--bg-1); border:1px solid rgba(0,0,0,0.08); display:flex; align-items:center; gap:8px;">
          <span style="font-size:1.05rem; font-weight:600; color:rgba(0,0,0,0.5);">$</span>
          <span style="flex:1; text-align:right; font-weight:600; color:var(--jh-blue);">0.00</span>
        </div>
      </div>
    </div>

    <p style="font-size:0.8rem; color:var(--muted); margin:0 0 32px 0;">Next: Add recipient (creditor) details</p>
  </main>

  <div style="padding:16px 20px 32px; background:var(--bg-1);">
    <button class="jh-btn-primary" style="width:100%; padding:16px; font-size:1rem;">Continue</button>
  </div>
</div>
