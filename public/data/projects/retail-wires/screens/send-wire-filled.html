<link rel="stylesheet" href="../../../../styles/shared.css">
<link rel="stylesheet" href="../../../../styles/ds.css">
<link rel="stylesheet" href="../../../../data/design-system/company.css">
<style>
  html, body { margin: 0; padding: 0; }
  .jh-row { align-items: flex-start; }
  .jh-row .jh-label { flex-shrink: 0; }
  .jh-row .jh-detail-value { min-width: 0; text-align: right; }
  .recipient-card { background: var(--bg-0); border-radius: var(--radius-lg); border: 1px solid rgba(0,0,0,0.08); padding: 16px 20px; }
  .recipient-card-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: rgba(0,0,0,0.5); margin-bottom: 4px; }
  .check-badge { width: 18px; height: 18px; border-radius: 50%; background: var(--jh-green); display: grid; place-items: center; flex-shrink: 0; }
</style>
<div style="background:var(--bg-1); display:flex; flex-direction:column;">
  <div class="jh-header-bar" style="border-radius:0; padding:12px 16px 14px;">
    <div style="width:60px;"></div>
    <span class="jh-header-bar-title">Send wire</span>
    <button style="background:none; border:none; color:rgba(255,255,255,0.95); padding:4px 0; font-size:0.85rem; font-weight:700; font-family:inherit;">CANCEL</button>
  </div>

  <main style="flex:1; padding:20px 16px;">
    <p class="jh-section-label" style="margin:0 0 12px 0;">Wire details</p>
    <div style="background:var(--bg-0); border-radius:var(--radius-lg); padding:20px; margin-bottom:20px;">
      <div style="margin-bottom:16px;">
        <label style="display:block; font-size:0.75rem; font-weight:600; color:rgba(0,0,0,0.6); margin-bottom:6px;">From account</label>
        <div style="padding:12px 16px; border-radius:var(--radius-md); background:var(--bg-1); border:1px solid rgba(0,0,0,0.08);">
          <p style="font-size:0.95rem; font-weight:600; color:rgba(0,0,0,0.9); margin:0 0 2px 0;">Payment for materials</p>
          <p style="font-size:0.8rem; color:var(--muted); margin:0;">Business checking (x1234)</p>
        </div>
      </div>
      <div style="margin-bottom:16px;">
        <label style="display:block; font-size:0.75rem; font-weight:600; color:rgba(0,0,0,0.6); margin-bottom:6px;">Amount</label>
        <div style="padding:14px 16px; border-radius:var(--radius-md); background:var(--bg-1); display:flex; align-items:center; gap:8px;">
          <span style="font-size:1.05rem; font-weight:600; color:rgba(0,0,0,0.5);">$</span>
          <span style="flex:1; text-align:right; font-weight:600; color:var(--jh-blue);">150.00</span>
        </div>
      </div>
      <div>
        <label style="display:block; font-size:0.75rem; font-weight:600; color:rgba(0,0,0,0.6); margin-bottom:6px;">Remittance info (optional)</label>
        <div style="padding:12px 16px; border-radius:var(--radius-md); background:var(--bg-1); border:1px solid rgba(0,0,0,0.08); min-height:80px; color:rgba(0,0,0,0.45); font-size:0.9rem;">Add up to four lines of notes or reference details.</div>
      </div>
    </div>

    <p class="jh-section-label" style="margin:0 0 12px 0;">Recipient details</p>
    <div class="recipient-card" style="margin-bottom:12px;">
      <div style="display:flex; align-items:flex-start; gap:14px;">
        <div style="position:relative;">
          <div style="width:44px; height:44px; border-radius:var(--radius-sm); background:rgba(var(--jh-blue-rgb),0.1); display:grid; place-items:center;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--jh-blue)" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div class="check-badge" style="position:absolute; bottom:-2px; right:-2px;"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg></div>
        </div>
        <div style="flex:1; min-width:0;">
          <p style="font-size:0.95rem; font-weight:700; color:rgba(0,0,0,0.9); margin:0 0 2px 0;">Amy Smith</p>
          <p style="font-size:0.8rem; color:var(--muted); margin:0;">****56678 - Elm Street, Maple Grove, CA</p>
        </div>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(0,0,0,0.5)" stroke-width="1.8"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </div>
    </div>
    <div class="recipient-card">
      <div style="display:flex; align-items:flex-start; gap:14px;">
        <div style="position:relative;">
          <div style="width:44px; height:44px; border-radius:var(--radius-sm); background:rgba(var(--jh-blue-rgb),0.1); display:grid; place-items:center;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--jh-blue)" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
          </div>
          <div class="check-badge" style="position:absolute; bottom:-2px; right:-2px;"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg></div>
        </div>
        <div style="flex:1; min-width:0;">
          <p style="font-size:0.95rem; font-weight:700; color:rgba(0,0,0,0.9); margin:0 0 2px 0;">ABC Bank</p>
          <p style="font-size:0.8rem; color:var(--muted); margin:0;">123 Maple Street, Springfield, USA</p>
        </div>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(0,0,0,0.5)" stroke-width="1.8"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </div>
    </div>
  </main>

  <div style="padding:16px 20px 32px; background:var(--bg-1);">
    <button class="jh-btn-primary" style="width:100%; padding:16px; font-size:1rem;">Review & send</button>
  </div>
</div>
