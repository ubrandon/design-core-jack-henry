<link rel="stylesheet" href="../../../../styles/shared.css">
<link rel="stylesheet" href="../../../../styles/ds.css">
<link rel="stylesheet" href="../../../../data/design-system/company.css">
<div style="padding:16px; max-width:390px; margin:0 auto; background:var(--bg-0); border-radius:var(--radius-lg); display:flex; flex-direction:column;">
  <header style="display:flex;align-items:center;justify-content:space-between;padding:20px 16px;">
    <a href="#" style="color:rgba(0,0,0,0.6);text-decoration:none;font-weight:600;font-size:0.85rem;">Back</a>
    <span style="font-weight:700;font-size:0.95rem;color:rgba(0,0,0,0.88);">Wire details</span>
    <div style="display:flex;gap:16px;color:rgba(0,0,0,0.4);">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
    </div>
  </header>

  <main style="flex:1;padding:0 24px 32px;">
    <p style="font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(0,0,0,0.35);margin-bottom:8px;">Materials payment</p>
    <p style="font-size:2.25rem;font-weight:800;color:rgba(0,0,0,0.9);letter-spacing:-0.03em;margin:0 0 8px 0;line-height:1.1;">$250.00</p>
    <p style="font-size:0.8rem;font-weight:600;color:var(--jh-green);margin-bottom:48px;">Ready</p>

    <div style="margin-bottom:32px;">
      <p style="font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(0,0,0,0.35);margin-bottom:16px;">Payment</p>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:10px 0;">
        <span class="jh-label">From account</span>
        <span class="jh-detail-value" style="text-align:right;">Business Checking (x1234)</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:10px 0;">
        <span class="jh-label">Notes</span>
        <span class="jh-detail-value" style="text-align:right;">This is a note</span>
      </div>
    </div>

    <div style="margin-bottom:32px;">
      <p style="font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(0,0,0,0.35);margin-bottom:16px;">Recipient</p>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:10px 0;">
        <span class="jh-label">Name</span>
        <span class="jh-detail-value" style="text-align:right;">Emma Reed</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:10px 0;">
        <span class="jh-label">Account</span>
        <span class="jh-detail-value" style="text-align:right;">123456789</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:10px 0;">
        <span class="jh-label" style="flex-shrink:0;">Address</span>
        <span class="jh-detail-value" style="text-align:right;line-height:1.5;">500 W. 33rd St, 62nd Floor / 30 Hudson Yards / 10001 New York, NY, US</span>
      </div>
    </div>

    <a href="#" style="font-size:0.85rem;font-weight:600;color:var(--jh-blue);text-decoration:none;">More details</a>
  </main>

  <div style="padding:24px;border-top:1px solid rgba(0,0,0,0.06);">
    <button class="jh-btn-primary" style="width:100%;padding:14px;">Review and initiate</button>
  </div>
</div>
