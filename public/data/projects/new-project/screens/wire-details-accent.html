<link rel="stylesheet" href="../../../../styles/shared.css">
<link rel="stylesheet" href="../../../../styles/ds.css">
<link rel="stylesheet" href="../../../../data/design-system/company.css">
<div style="padding:16px; max-width:390px; margin:0 auto; background:var(--bg-0); border-radius:var(--radius-lg); display:flex; flex-direction:column;">
  <header style="display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid rgba(0,0,0,0.06);">
    <a href="#" style="color:var(--jh-navy);text-decoration:none;font-weight:600;font-size:0.9rem;">← Back</a>
    <span style="font-weight:700;color:rgba(0,0,0,0.88);">Wire details</span>
    <div style="display:flex;gap:12px;color:rgba(0,0,0,0.45);">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
    </div>
  </header>

  <main style="flex:1;padding:0;">
    <div style="border-left:4px solid var(--jh-blue);padding:20px 20px 20px 24px;background:var(--bg-1);margin:16px 16px 0;">
      <p style="font-size:0.75rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:rgba(0,0,0,0.45);margin:0 0 6px 0;">Materials payment</p>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
        <p style="font-size:1.75rem;font-weight:800;color:var(--jh-blue);margin:0;">$250.00</p>
        <span style="padding:5px 12px;border-radius:999px;background:var(--jh-green);color:#fff;font-size:0.75rem;font-weight:700;">Ready</span>
      </div>
    </div>

    <div style="padding:20px 16px;">
      <div style="display:flex;align-items:stretch;gap:0;border:1px solid rgba(0,0,0,0.08);border-radius:var(--radius-md);overflow:hidden;margin-bottom:16px;">
        <div style="width:4px;background:rgba(var(--jh-blue-rgb),0.3);flex-shrink:0;"></div>
        <div style="flex:1;padding:16px 18px;">
          <p style="font-size:0.7rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:rgba(0,0,0,0.45);margin:0 0 12px 0;">Payment</p>
          <div class="jh-row" style="padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.06);"><span class="jh-label">From account</span><span class="jh-detail-value">Business Checking (x1234)</span></div>
          <div class="jh-row" style="padding:8px 0;"><span class="jh-label">Notes</span><span class="jh-detail-value">This is a note</span></div>
        </div>
      </div>

      <div style="display:flex;align-items:stretch;gap:0;border:1px solid rgba(0,0,0,0.08);border-radius:var(--radius-md);overflow:hidden;">
        <div style="width:4px;background:rgba(var(--jh-blue-rgb),0.3);flex-shrink:0;"></div>
        <div style="flex:1;padding:16px 18px;">
          <p style="font-size:0.7rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:rgba(0,0,0,0.45);margin:0 0 12px 0;">Recipient</p>
          <div class="jh-row" style="padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.06);"><span class="jh-label">Name</span><span class="jh-detail-value">Emma Reed</span></div>
          <div class="jh-row" style="padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.06);"><span class="jh-label">Account</span><span class="jh-detail-value">123456789</span></div>
          <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;gap:12px;">
            <span class="jh-label" style="flex-shrink:0;">Address</span>
            <span class="jh-detail-value" style="text-align:right;font-size:0.82rem;">500 W. 33rd St, 62nd Floor / 30 Hudson Yards / 10001 New York, NY, US</span>
          </div>
        </div>
      </div>

      <a href="#" class="jh-link-action" style="display:inline-flex;align-items:center;gap:6px;margin-top:16px;">More details <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></a>
    </div>
  </main>

  <div style="padding:16px;border-top:1px solid rgba(0,0,0,0.06);">
    <button class="jh-btn-primary" style="width:100%;padding:14px;">Review and initiate</button>
  </div>
</div>
