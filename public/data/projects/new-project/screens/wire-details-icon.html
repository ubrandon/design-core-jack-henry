<link rel="stylesheet" href="../../../../styles/shared.css">
<link rel="stylesheet" href="../../../../styles/ds.css">
<link rel="stylesheet" href="../../../../data/design-system/company.css">
<div style="padding:16px; max-width:390px; margin:0 auto; background:var(--bg-0); border-radius:var(--radius-lg); display:flex; flex-direction:column;">
  <header class="jh-header-bar" style="flex-shrink:0;">
    <a href="#" style="display:flex;align-items:center;gap:6px;color:#fff;text-decoration:none;font-size:0.9rem;font-weight:600;">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back
    </a>
    <span class="jh-header-bar-title">Wire details</span>
    <div style="display:flex;gap:16px;color:rgba(255,255,255,0.9);">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
    </div>
  </header>

  <main style="flex:1;padding:20px 16px;">
    <div style="display:flex;align-items:center;gap:16px;padding:20px;background:linear-gradient(180deg, rgba(var(--jh-blue-rgb),0.06) 0%, transparent 100%);border-radius:var(--radius-lg);margin-bottom:20px;">
      <div style="width:56px;height:56px;border-radius:var(--radius-md);background:var(--jh-blue);display:grid;place-items:center;flex-shrink:0;">
        <svg width="28" height="28" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      </div>
      <div style="flex:1;min-width:0;">
        <p style="font-size:0.8rem;font-weight:600;color:rgba(0,0,0,0.55);margin:0 0 4px 0;">Materials payment</p>
        <p style="font-size:1.5rem;font-weight:800;color:var(--jh-blue);margin:0;">$250.00</p>
      </div>
      <span style="padding:6px 12px;border-radius:999px;background:rgba(var(--jh-green-rgb),0.15);color:var(--jh-green);font-size:0.75rem;font-weight:700;">Ready</span>
    </div>

    <div style="display:flex;gap:14px;padding:16px 0;border-bottom:1px solid rgba(0,0,0,0.06);">
      <div style="width:40px;height:40px;border-radius:var(--radius-sm);background:rgba(var(--jh-blue-rgb),0.1);display:grid;place-items:center;flex-shrink:0;">
        <svg width="20" height="20" fill="none" stroke="var(--jh-blue)" stroke-width="2" viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      </div>
      <div style="flex:1;min-width:0;">
        <div class="jh-row" style="padding:8px 0;margin-bottom:8px;"><span class="jh-label">From account</span><span class="jh-detail-value">Business Checking (x1234)</span></div>
        <div class="jh-row" style="padding:8px 0;"><span class="jh-label">Notes</span><span class="jh-detail-value">This is a note</span></div>
      </div>
    </div>

    <div style="display:flex;gap:14px;padding:16px 0;">
      <div style="width:40px;height:40px;border-radius:var(--radius-sm);background:rgba(var(--jh-blue-rgb),0.1);display:grid;place-items:center;flex-shrink:0;">
        <svg width="20" height="20" fill="none" stroke="var(--jh-blue)" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div style="flex:1;min-width:0;">
        <div class="jh-row" style="padding:8px 0;margin-bottom:8px;"><span class="jh-label">Recipient name</span><span class="jh-detail-value">Emma Reed</span></div>
        <div class="jh-row" style="padding:8px 0;margin-bottom:8px;"><span class="jh-label">Account number</span><span class="jh-detail-value">123456789</span></div>
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:8px 0;">
          <span class="jh-label" style="flex-shrink:0;">Address</span>
          <span class="jh-detail-value" style="text-align:right;font-size:0.82rem;">500 W. 33rd St, 62nd Floor / 30 Hudson Yards / 10001 New York, NY, US</span>
        </div>
      </div>
    </div>

    <a href="#" class="jh-link-action" style="display:inline-flex;align-items:center;gap:6px;margin-top:16px;">More details <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></a>
  </main>

  <div style="padding:16px;border-top:1px solid rgba(0,0,0,0.06);">
    <button class="jh-btn-primary" style="width:100%;padding:14px;">Review and initiate</button>
  </div>
</div>
