<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello (online)</title>
  <link rel="stylesheet" href="../../../../../styles/shared.css">
  <link rel="stylesheet" href="../../../../../styles/ds.css">
  <style>
    .sample-layout { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
    .sample-side { background: var(--bg-1); border-right: 1px solid var(--border); padding: 20px 16px; }
    .sample-main { padding: 28px 32px; }
    .sample-count { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.03em; margin: 16px 0; }
  </style>
</head>
<body>
  <div class="sample-layout">
    <aside class="sample-side">
      <p class="ds-section-title" style="margin-bottom: 8px;">Online</p>
      <p style="color: var(--muted); font-size: 0.85rem;">Sidebar + main — fits the desktop frame.</p>
    </aside>
    <main class="sample-main">
      <h1 style="font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px;">Desktop-style prototype</h1>
      <p style="color: var(--muted); max-width: 42rem; margin-bottom: 16px;">Same counter as the mobile example, wider layout for web flows.</p>
      <div class="sample-count" id="count">0</div>
      <button type="button" class="btn btn-primary" id="btn">Increment</button>
    </main>
  </div>
  <script>
    let n = 0;
    const count = document.getElementById("count");
    document.getElementById("btn").addEventListener("click", () => {
      n += 1;
      count.textContent = String(n);
    });
  </script>
</body>
</html>
