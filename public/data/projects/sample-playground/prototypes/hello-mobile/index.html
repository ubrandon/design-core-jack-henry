<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello (mobile)</title>
  <link rel="stylesheet" href="../../../../../styles/shared.css">
  <link rel="stylesheet" href="../../../../../styles/ds.css">
  <style>
    .sample-wrap { padding: 20px 16px; max-width: 100%; }
    .sample-count { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; margin: 12px 0; }
  </style>
</head>
<body>
  <div class="sample-wrap">
    <p class="ds-section-title">Mobile prototype</p>
    <p style="color: var(--muted); font-size: 0.9rem; margin-bottom: 8px;">Tap the button — state lives in this page only.</p>
    <div class="sample-count" id="count">0</div>
    <button type="button" class="btn btn-primary" id="btn">Increment</button>
  </div>
  <script>
    let n = 0;
    const count = document.getElementById("count");
    document.getElementById("btn").addEventListener("click", () => {
      n += 1;
      count.textContent = String(n);
    });
  </script>
</body>
</html>
