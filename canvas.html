<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas — Design Core</title>
  <link rel="stylesheet" href="styles/shared.css">
  <link rel="stylesheet" href="styles/ds.css">
  <link rel="stylesheet" href="styles/canvas-space.css">
  <link rel="stylesheet" href="styles/zoom-controls.css">
  <link rel="stylesheet" href="styles/app.css">
  <style>
    .canvas-card-body { overflow: hidden; max-height: none; }
  </style>
</head>
<body>

  <div id="viewport" class="canvas-space-viewport">
    <div id="stage" class="canvas-space-stage"></div>
  </div>

  <div class="zoom-controls">
    <button class="zoom-btn zoom-btn--tidy" onclick="tidyLayout()" title="Tidy layout">Tidy</button>
    <button class="zoom-btn zoom-btn--tidy" onclick="refreshScreens()" title="Reload screens to see edits">Refresh</button>
    <div class="zoom-controls__zoom-group">
      <button class="zoom-btn" onclick="pz.zoomBy(-0.04)" title="Zoom out">&minus;</button>
      <span id="zoom-label" class="zoom-level">100%</span>
      <button class="zoom-btn" onclick="pz.zoomBy(0.04)" title="Zoom in">+</button>
      <button class="zoom-btn" onclick="pz.resetView()" title="Reset view" style="font-size:0.8rem;">&#8962;</button>
    </div>
  </div>

  <script src="scripts/shared.js"></script>
  <script src="scripts/nav.js"></script>
  <script src="scripts/canvas-pan-zoom.js"></script>
  <script>
    const CARD_GAP = 40;
    const DRAG_THRESHOLD = 5;

    const projectId = getParam("project");
    if (!projectId) window.location.href = "index.html";

    renderNav({
      breadcrumbs: [
        { label: projectId, href: "project.html?id=" + projectId, id: "project-link" },
        { label: "Canvas" },
      ],
      fixed: true,
    });

    fetchJSON("data/projects/" + projectId + "/project.json")
      .then(data => {
        var link = document.getElementById("project-link");
        if (link) link.textContent = data.name;
        document.title = data.name + " — Canvas — Design Core";
      })
      .catch(() => {});

    const viewport = document.getElementById("viewport");
    const stage = document.getElementById("stage");

    const STORAGE_KEY = "design-core-canvas-" + (projectId || "default");
    let restoreState = null;
    try {
      const s = sessionStorage.getItem(STORAGE_KEY);
      if (s) restoreState = JSON.parse(s);
    } catch (_) {}

    const pz = initPanZoom(viewport, stage, { navHeight: 52, restoreState });

    function savePanZoom() {
      try {
        sessionStorage.setItem(STORAGE_KEY, JSON.stringify({
          panX: pz.panX,
          panY: pz.panY,
          zoom: pz.zoom,
        }));
      } catch (_) {}
    }
    window.addEventListener("pagehide", savePanZoom);

    let screens = [];

    /* ── Selection state ── */
    const selected = new Set();

    function setSelected(indices) {
      selected.clear();
      indices.forEach(i => selected.add(i));
      applySelectionClasses();
      updateSelectionBar();
    }

    function toggleSelected(idx) {
      if (selected.has(idx)) selected.delete(idx); else selected.add(idx);
      applySelectionClasses();
      updateSelectionBar();
    }

    function clearSelection() {
      selected.clear();
      applySelectionClasses();
      updateSelectionBar();
    }

    function applySelectionClasses() {
      screens.forEach((_, i) => {
        const card = document.getElementById("card-" + i);
        if (card) card.classList.toggle("is-selected", selected.has(i));
      });
    }

    /* ── Selection toolbar ── */
    let selectionBar = null;

    function updateSelectionBar() {
      if (selected.size === 0) {
        if (selectionBar) { selectionBar.remove(); selectionBar = null; }
        return;
      }
      if (!selectionBar) {
        selectionBar = document.createElement("div");
        selectionBar.className = "canvas-selection-bar";
        document.body.appendChild(selectionBar);
      }
      const label = selected.size === 1 ? "1 screen" : selected.size + " screens";
      selectionBar.innerHTML =
        '<span class="canvas-selection-bar-label">' + label + ' selected</span>' +
        '<button class="canvas-selection-bar-btn" onclick="deleteSelected()">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>' +
        'Delete</button>';
    }

    /* ── Delete selected screens ── */
    function deleteSelected() {
      if (selected.size === 0) return;
      const indices = Array.from(selected).sort((a, b) => b - a);
      indices.forEach(i => screens.splice(i, 1));
      clearSelection();
      renderCards();
      saveCanvas();
    }

    function saveCanvas() {
      const payload = { screens: screens.map(s => ({ file: s.file, x: Math.round(s.x), y: Math.round(s.y), width: s.width })) };
      fetch("data/projects/" + projectId + "/canvas.json", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload, null, 2),
      }).catch(() => {});
    }

    /* ── Keyboard shortcuts ── */
    window.addEventListener("keydown", function (e) {
      if (e.key === "Delete" || e.key === "Backspace") {
        if (selected.size > 0 && !e.target.closest("input, textarea, [contenteditable]")) {
          e.preventDefault();
          deleteSelected();
        }
      }
      if ((e.key === "a" || e.key === "A") && (e.metaKey || e.ctrlKey)) {
        if (!e.target.closest("input, textarea, [contenteditable]")) {
          e.preventDefault();
          setSelected(screens.map((_, i) => i));
        }
      }
      if (e.key === "Escape") {
        clearSelection();
      }
    });

    /* ── Pointer interaction on cards ── */
    let cardPointer = null;

    function onCardPointerDown(e, idx) {
      if (pz.spaceHeld) return;
      e.stopPropagation();

      const rect = viewport.getBoundingClientRect();
      cardPointer = {
        idx: idx,
        startX: e.clientX,
        startY: e.clientY,
        moved: false,
        stageOffX: 0,
        stageOffY: 0,
        dragOffsets: null,
      };

      viewport.setPointerCapture(e.pointerId);
    }

    viewport.addEventListener("pointermove", (e) => {
      if (!cardPointer) return;

      const dx = e.clientX - cardPointer.startX;
      const dy = e.clientY - cardPointer.startY;

      if (!cardPointer.moved && Math.abs(dx) < DRAG_THRESHOLD && Math.abs(dy) < DRAG_THRESHOLD) return;

      if (!cardPointer.moved) {
        cardPointer.moved = true;
        viewport.classList.add("dragging-card");

        if (!selected.has(cardPointer.idx)) {
          if (!e.shiftKey && !e.metaKey && !e.ctrlKey) {
            setSelected([cardPointer.idx]);
          } else {
            selected.add(cardPointer.idx);
            applySelectionClasses();
            updateSelectionBar();
          }
        }

        const rect = viewport.getBoundingClientRect();
        const sX = (cardPointer.startX - rect.left - pz.panX - rect.width / 2) / pz.zoom;
        const sY = (cardPointer.startY - rect.top - pz.panY - rect.height / 2 + 52) / pz.zoom;

        cardPointer.dragOffsets = [];
        selected.forEach(i => {
          cardPointer.dragOffsets.push({ idx: i, offX: sX - screens[i].x, offY: sY - screens[i].y });
        });
      }

      const rect = viewport.getBoundingClientRect();
      const stageX = (e.clientX - rect.left - pz.panX - rect.width / 2) / pz.zoom;
      const stageY = (e.clientY - rect.top - pz.panY - rect.height / 2 + 52) / pz.zoom;

      cardPointer.dragOffsets.forEach(d => {
        const s = screens[d.idx];
        s.x = stageX - d.offX;
        s.y = stageY - d.offY;
        const card = document.getElementById("card-" + d.idx);
        if (card) {
          card.style.left = s.x + "px";
          card.style.top = s.y + "px";
        }
      });
    });

    viewport.addEventListener("pointerup", (e) => {
      if (!cardPointer) return;

      if (!cardPointer.moved) {
        const idx = cardPointer.idx;
        if (e.shiftKey || e.metaKey || e.ctrlKey) {
          toggleSelected(idx);
        } else {
          setSelected([idx]);
        }
      }

      if (cardPointer.moved) {
        viewport.classList.remove("dragging-card");
      }

      cardPointer = null;
    });

    /* ── Marquee selection on empty canvas ── */
    let marquee = null;
    let marqueeEl = null;

    viewport.addEventListener("pointerdown", (e) => {
      if (e.target.closest(".canvas-card")) return;
      if (pz.spaceHeld) return;

      marquee = {
        startX: e.clientX,
        startY: e.clientY,
        moved: false,
        pointerId: e.pointerId,
      };
    });

    viewport.addEventListener("pointermove", (e) => {
      if (!marquee) return;

      const dx = e.clientX - marquee.startX;
      const dy = e.clientY - marquee.startY;

      if (!marquee.moved && Math.abs(dx) < DRAG_THRESHOLD && Math.abs(dy) < DRAG_THRESHOLD) return;

      if (!marquee.moved) {
        marquee.moved = true;
        pz.isPanning = false;
        marqueeEl = document.createElement("div");
        marqueeEl.className = "canvas-marquee";
        document.body.appendChild(marqueeEl);
      }

      const x = Math.min(marquee.startX, e.clientX);
      const y = Math.min(marquee.startY, e.clientY);
      const w = Math.abs(dx);
      const h = Math.abs(dy);
      marqueeEl.style.left = x + "px";
      marqueeEl.style.top = y + "px";
      marqueeEl.style.width = w + "px";
      marqueeEl.style.height = h + "px";

      const hits = [];
      screens.forEach((s, i) => {
        const card = document.getElementById("card-" + i);
        if (card) {
          const cr = card.getBoundingClientRect();
          if (cr.right > x && cr.left < x + w && cr.bottom > y && cr.top < y + h) {
            hits.push(i);
          }
        }
      });
      setSelected(hits);
    });

    viewport.addEventListener("pointerup", (e) => {
      if (marquee) {
        if (!marquee.moved) {
          if (!e.shiftKey && !e.metaKey && !e.ctrlKey) clearSelection();
        }
        if (marqueeEl) { marqueeEl.remove(); marqueeEl = null; }
        marquee = null;
      }
    });

    /* ── Canvas data ── */

    function tidyLayout() {
      let x = 0;
      screens.forEach((s, i) => {
        const card = document.getElementById("card-" + i);
        const w = s.width || 390;
        s.x = x;
        s.y = 0;
        if (card) {
          card.style.left = s.x + "px";
          card.style.top = s.y + "px";
        }
        x += w + CARD_GAP;
      });
    }

    function loadCanvas() {
      return fetch("data/projects/" + projectId + "/canvas.json?t=" + Date.now())
        .then(r => {
          if (!r.ok) throw new Error(r.status);
          return r.json();
        })
        .then(data => {
          let autoX = 0;
          const next = data.screens.map((s) => {
            const w = s.width || 390;
            const x = s.x != null ? s.x : autoX;
            const y = s.y != null ? s.y : 0;
            autoX = x + w + CARD_GAP;
            return { file: s.file, x, y, width: w };
          });
          const structureSame = screens.length === next.length && next.every((n, i) =>
            screens[i] && n.file === screens[i].file && n.width === screens[i].width
          );
          if (!structureSame) {
            screens = next;
            renderCards();
            var empty = document.getElementById("canvas-empty");
            if (empty) empty.remove();
          }
        })
        .catch(() => {
          if (!screens.length) {
            stage.innerHTML = "";
            var existing = document.getElementById("canvas-empty");
            if (!existing) {
              var el = document.createElement("div");
              el.id = "canvas-empty";
              el.style.cssText = "position:fixed;inset:0;top:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;pointer-events:none;z-index:10;";
              el.innerHTML = '<div style="font-size:1.1rem;font-weight:800;color:rgba(0,0,0,0.55);margin-bottom:8px;">No screens yet</div><div style="font-size:0.9rem;color:rgba(0,0,0,0.4);line-height:1.55;max-width:340px;">Ask the AI to create screens for this project — describe the UI you want to explore.</div>';
              document.body.appendChild(el);
            }
          }
        });
    }

    function refreshScreens() {
      screens = [];
      clearSelection();
      const btn = document.querySelector('[onclick="refreshScreens()"]');
      if (btn) { btn.disabled = true; }
      loadCanvas().then(() => {
        if (btn) {
          btn.textContent = "✓ Refresh";
          btn.disabled = false;
          setTimeout(() => { btn.textContent = "Refresh"; }, 1500);
        }
      });
    }

    loadCanvas();

    function renderCards() {
      const bust = "?t=" + Date.now();
      stage.innerHTML = screens.map((s, i) => `
        <div class="canvas-card${selected.has(i) ? " is-selected" : ""}" id="card-${i}"
             style="left:${s.x}px; top:${s.y}px; width:${s.width}px;"
             onpointerdown="onCardPointerDown(event, ${i})">
          <div class="canvas-card-body">
            <iframe src="data/projects/${projectId}/screens/${s.file}${bust}"
                    width="${s.width}"
                    sandbox="allow-same-origin"
                    onload="autoSizeIframe(this)"
                    scrolling="no"
                    style="pointer-events:none; border:none; width:${s.width}px; overflow:hidden;"></iframe>
          </div>
        </div>
      `).join("");
    }

    function autoSizeIframe(iframe) {
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        iframe.style.height = doc.documentElement.scrollHeight + "px";
      } catch (e) {}
    }
  </script>
</body>
</html>
