<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design System — Design Core</title>
    <link rel="stylesheet" href="styles/shared.css" />
    <link rel="stylesheet" href="styles/ds.css" />
    <link rel="stylesheet" href="styles/canvas-space.css" />
    <link rel="stylesheet" href="styles/zoom-controls.css" />
    <link rel="stylesheet" href="styles/app.css" />
    <style>
      .ds-canvas-viewport {
        position: fixed;
        inset: 0;
        top: 52px;
        overflow: hidden;
        cursor: grab;
        background-color: #b8b8b8;
        background-image:
          radial-gradient(rgba(0, 0, 0, 0.04) 1px, transparent 1px),
          radial-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px);
        background-size: 24px 24px;
        background-position: 0 0, 12px 12px;
      }
      .ds-canvas-viewport:active { cursor: grabbing; }
      .ds-canvas-stage {
        position: absolute;
        top: 50%;
        left: 50%;
        transform-origin: 0 0;
        will-change: transform;
        min-width: 1px;
        min-height: 1px;
        padding: 40px 48px;
        display: flex;
        flex-direction: column;
        gap: 40px;
        width: max-content;
      }
      .ds-group {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .ds-group-header {
        font-size: 0.7rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(0, 0, 0, 0.45);
        padding-bottom: 6px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      }
      .ds-group-row {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        gap: 20px;
        align-items: flex-start;
      }
      .ds-section {
        padding: 20px;
        border-radius: var(--radius-lg);
        background: #ffffff;
        border: 1px solid rgba(0, 0, 0, 0.08);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        min-width: 280px;
        width: max-content;
        flex-shrink: 0;
        overflow: visible;
        --bg-0: #ffffff;
        --bg-1: #f8f9fb;
        --surface: rgba(0, 0, 0, 0.03);
        --border: rgba(0, 0, 0, 0.1);
        --text: rgba(0, 0, 0, 0.88);
        --muted: rgba(0, 0, 0, 0.55);
        --muted-2: rgba(0, 0, 0, 0.38);
        --shadow: 0 18px 60px rgba(0, 0, 0, 0.1);
        --shadow-soft: 0 10px 40px rgba(0, 0, 0, 0.06);
        color: var(--text);
      }
      .ds-section-header {
        font-size: 1.1rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: rgba(0, 0, 0, 0.8);
        margin-bottom: 20px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      }
      .ds-component-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 28px 20px;
      }
      .ds-component-grid > .ds-component-item {
        flex: 0 1 auto;
      }
      .ds-component-grid--fixed {
        flex-wrap: nowrap;
      }
      .ds-component-item {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 0;
        overflow: visible;
      }
      .ds-component-label {
        font-size: 0.72rem;
        font-weight: 700;
        color: rgba(0, 0, 0, 0.4);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .ds-component-preview {
        padding: 12px 0;
        min-height: 40px;
        overflow: visible;
      }
    </style>
  </head>
  <body>
    <div id="viewport" class="ds-canvas-viewport">
      <div id="stage" class="ds-canvas-stage"></div>
    </div>

    <div class="zoom-controls">
      <button class="zoom-btn zoom-btn--tidy" onclick="refreshDS()" title="Reload components to see edits">Refresh</button>
      <div class="zoom-controls__zoom-group">
        <button class="zoom-btn" onclick="pz.zoomBy(-0.04)" title="Zoom out">&minus;</button>
        <span id="zoom-label" class="zoom-level">100%</span>
        <button class="zoom-btn" onclick="pz.zoomBy(0.04)" title="Zoom in">+</button>
        <button class="zoom-btn" onclick="pz.resetView()" title="Reset view" style="font-size:0.8rem">&#8962;</button>
      </div>
    </div>

    <script src="scripts/shared.js"></script>
    <script src="scripts/nav.js"></script>
    <script src="scripts/canvas-pan-zoom.js"></script>
    <script>
      renderNav({
        breadcrumbs: [{ label: "Design System" }],
        fixed: true,
      });

      const viewport = document.getElementById("viewport");
      const stage = document.getElementById("stage");

      const DS_STORAGE_KEY = "design-core-canvas-ds";
      let restoreState = null;
      try {
        const s = sessionStorage.getItem(DS_STORAGE_KEY);
        if (s) restoreState = JSON.parse(s);
      } catch (_) {}

      const pz = initPanZoom(viewport, stage, { navHeight: 52, restoreState });

      function savePanZoom() {
        try {
          sessionStorage.setItem(DS_STORAGE_KEY, JSON.stringify({
            panX: pz.panX,
            panY: pz.panY,
            zoom: pz.zoom,
          }));
        } catch (_) {}
      }
      window.addEventListener("pagehide", savePanZoom);

      // Auto-load company.css if it exists (brand overrides for company repos)
      fetch("data/design-system/company.css?t=" + Date.now(), { method: "HEAD" })
        .then(r => {
          if (r.ok) {
            const link = document.createElement("link");
            link.rel = "stylesheet";
            link.href = "data/design-system/company.css?t=" + Date.now();
            document.head.appendChild(link);
          }
        })
        .catch(() => {});

      async function loadDesignSystem() {
        const bust = "?t=" + Date.now();
        let registry;
        try {
          const res = await fetch("data/design-system/registry.json" + bust);
          if (!res.ok) throw new Error(res.status);
          registry = await res.json();
        } catch {
          stage.innerHTML = '<div style="padding:40px;color:rgba(0,0,0,0.5);">Could not load design system registry.</div>';
          return;
        }

        const groups = registry.groups || [{ id: "default", name: "Components" }];
        const categories = registry.categories || [];

        if (groups.length === 0 || categories.length === 0) {
          stage.innerHTML = "";
          if (!document.getElementById("ds-empty")) {
            const el = document.createElement("div");
            el.id = "ds-empty";
            el.style.cssText = "position:fixed;inset:0;top:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;pointer-events:none;z-index:10;";
            el.innerHTML = `
              <div style="width:64px;height:64px;border-radius:50%;background:rgba(59,130,246,0.1);display:grid;place-items:center;margin-bottom:20px;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(59,130,246,0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                  <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                  <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                  <rect x="14" y="14" width="7" height="7" rx="1.5"/>
                </svg>
              </div>
              <div style="font-size:1.15rem;font-weight:800;color:rgba(0,0,0,0.75);margin-bottom:8px;">Your design system is empty</div>
              <div style="font-size:0.9rem;color:rgba(0,0,0,0.45);max-width:340px;line-height:1.55;">
                Start by telling the AI what your app looks like — share screenshots, describe your brand colors, or ask it to create components for you.
              </div>
            `;
            document.body.appendChild(el);
          }
          return;
        }

        const dsEmpty = document.getElementById("ds-empty");
        if (dsEmpty) dsEmpty.remove();

        const byGroup = new Map();
        for (const g of groups) byGroup.set(g.id, []);
        for (const cat of categories) {
          const gid = cat.group || "default";
          if (!byGroup.has(gid)) byGroup.set(gid, []);
          byGroup.get(gid).push(cat);
        }

        const componentFetches = [];
        for (const cat of categories) {
          for (const comp of cat.components) {
            componentFetches.push(
              fetch("data/design-system/components/" + comp.file + bust)
                .then(r => r.ok ? r.text() : Promise.reject())
                .then(content => ({ id: comp.id, content }))
                .catch(() => ({ id: comp.id, content: '<div class="empty-state">Could not load ' + comp.file + '</div>' }))
            );
          }
        }
        const loaded = await Promise.all(componentFetches);
        const contentMap = new Map();
        for (const c of loaded) contentMap.set(c.id, c.content);

        const groupHtml = [];
        for (const g of groups) {
          const cats = byGroup.get(g.id) || [];
          if (cats.length === 0) continue;

          const sections = [];
          for (const cat of cats) {
            const layout = typeof cat.layout === "string" ? { mode: cat.layout } : cat.layout || {};
            const isRow = layout.mode === "row";
            const gridClass = isRow ? "ds-component-grid ds-component-grid--fixed" : "ds-component-grid";
            const gridStyle = "";

            sections.push(`
              <section class="ds-section">
                <h2 class="ds-section-header">${cat.name}</h2>
                <div class="${gridClass}" ${gridStyle}>
                  ${cat.components.map(comp => `
                    <div class="ds-component-item">
                      <span class="ds-component-label">${comp.label}</span>
                      <div class="ds-component-preview">${contentMap.get(comp.id) || ""}</div>
                    </div>
                  `).join("")}
                </div>
              </section>
            `);
          }

          groupHtml.push(`
            <div class="ds-group ds-group--${g.id}">
              <h2 class="ds-group-header">${g.name}</h2>
              <div class="ds-group-row">${sections.join("")}</div>
            </div>
          `);
        }

        stage.innerHTML = groupHtml.join("");
        pz.applyTransform();
      }

      function refreshDS() {
        const btn = document.querySelector('[onclick="refreshDS()"]');
        if (btn) { btn.disabled = true; }
        loadDesignSystem().then(() => {
          if (btn) {
            btn.textContent = "✓ Refresh";
            btn.disabled = false;
            setTimeout(() => { btn.textContent = "Refresh"; }, 1500);
          }
        });
      }

      loadDesignSystem();
    </script>
  </body>
</html>
